name: secrets-scan

# CI-side enforcement that runs on every push and PR.
# Local hooks (.husky/) catch more (employer-specific denylist), but
# this workflow is the layer teammates and bots cannot bypass.
#
# Scans:
#   1. Sensitive filenames (.env, *.pem, token.json, etc.)
#   2. gitleaks — committed secrets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GL_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Resolve scan range
        id: range
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            BASE="${{ github.event.before }}"
            if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
              BASE=$(git hash-object -t tree /dev/null)
            fi
            echo "base=$BASE" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Filename guard
        run: |
          BASE="${{ steps.range.outputs.base }}"
          HEAD="${{ steps.range.outputs.head }}"
          FILES=$(git diff --name-only "$BASE".."$HEAD")
          REGEX='(^|/)(\.env(\..*)?|token\.json|credentials\.json|secrets\.json|.*\.pem|.*\.key|.*\.p12|service-account.*\.json)$'
          BLOCKED=$(echo "$FILES" | grep -E "$REGEX" || true)
          if [[ -n "$BLOCKED" ]]; then
            echo "::error::Sensitive filenames in diff:"
            echo "$BLOCKED"
            exit 1
          fi

      - name: gitleaks
        run: |
          BASE="${{ steps.range.outputs.base }}"
          HEAD="${{ steps.range.outputs.head }}"
          gitleaks detect --redact --no-banner --log-opts="$BASE..$HEAD"
